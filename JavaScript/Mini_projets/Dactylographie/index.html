<!DOCTYPE html>
<html lang="fr" data-theme="cupcake">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

    <script>
        tailwind.config = {
            daisyui: {
                themes: ["cupcake"], // On force le thème ici
            },
        }
    </script>
    
    <style>
        /* Plan de secours : Si Tailwind fait encore de la résistance, 
           on force manuellement la couleur primaire du thème cupcake */
        [data-theme="cupcake"] .bg-primary {
            background-color: #ef9fbc !important; /* C'est le rose Cupcake ! */
            color: #291334 !important;
        }
        [data-theme="cupcake"] .badge-primary.badge-outline {
            color: #ef9fbc !important;
            border-color: #ef9fbc !important;
        }
    </style>
</head>

<body data-theme="cupcake" class="min-h-screen bg-base-200 flex items-center justify-center p-4">

    <div class="card w-full max-w-md bg-base-100 shadow-2xl overflow-hidden">
        
        <div class="bg-primary p-6 text-primary-content text-center">
            <h1 class="text-3xl font-black tracking-tighter uppercase">Typing Master</h1>
            <p class="text-xs opacity-70">Le record à battre : <span id="record-display" class="font-bold">0</span></p>
        </div>

        <div class="card-body items-center text-center gap-6">
            
            <div class="w-full bg-neutral text-neutral-content py-8 rounded-xl shadow-inner relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 bg-gradient-to-tr from-white to-transparent pointer-events-none"></div>
                <h2 id="word" class="text-5xl font-mono font-black tracking-widest uppercase">...</h2>
            </div>

            <div class="form-control w-full">
                <input type="text" id="input" 
                       placeholder="Commencez à taper..." 
                       class="input input-bordered input-primary input-lg w-full text-center text-2xl font-bold shadow-sm focus:scale-105 transition-all duration-200"
                       autofocus autocomplete="off">
            </div>

            <div class="stats shadow bg-base-200 w-full">
                <div class="stat place-items-center">
                    <div class="stat-title text-xs uppercase font-bold">Temps</div>
                    <div id="time" class="stat-value text-error">10</div>
                    <div class="stat-desc font-medium">secondes</div>
                </div>
                
                <div class="stat place-items-center">
                    <div class="stat-title text-xs uppercase font-bold">Score</div>
                    <div id="score" class="stat-value text-success">0</div>
                    <div class="stat-desc font-medium">points</div>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <div class="badge badge-primary badge-outline font-bold uppercase p-3">
                    Niveau : <span id="level-display" class="ml-2">facile</span>
                </div>
            </div>

        </div>
    </div>
<audio id="sound-success" src="success.mp3"></audio>
<audio id="sound-error" src="error.mp3"></audio>
<script src="script.js"></script>
</body>
</html>
